<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Crypto Miner Bot</title>
    <!-- SDK de Telegram y TonConnect -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://unpkg.com/@tonconnect/ui@latest/dist/tonconnect-ui.min.js"></script>
    <style>
        :root {
            --bg-dark: #080b14;
            --card-bg: rgba(22, 28, 45, 0.65);
            --card-border: rgba(255, 255, 255, 0.1);
            --accent-cyan: #00f2fe;
            --accent-gold: #f59e0b;
            --text-main: #ffffff;
            --text-sub: #94a3b8;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
            -webkit-user-select: none;
        }

        body {
            background-color: var(--bg-dark);
            background-image: 
                radial-gradient(circle at 50% 35%, rgba(30, 27, 75, 0.8) 0%, rgba(8, 11, 20, 1) 75%);
            color: var(--text-main);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            overflow-x: hidden;
            padding-bottom: 80px;
        }

        /* --- 1. HEADER (PERFIL & MONEDAS) --- */
        .top-header {
            display: flex;
            flex-direction: column;
            gap: 12px;
            padding: 12px 16px;
        }

        .user-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .profile-info {
            display: flex;
            align-items: center;
            gap: 10px;
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            padding: 6px 12px 6px 6px;
            border-radius: 30px;
            backdrop-filter: blur(10px);
        }

        .avatar {
            width: 38px;
            height: 38px;
            border-radius: 50%;
            border: 2px solid var(--accent-cyan);
            object-fit: cover;
        }

        .user-details {
            display: flex;
            flex-direction: column;
        }

        .username {
            font-size: 14px;
            font-weight: 700;
        }

        .level-badge {
            font-size: 11px;
            color: var(--accent-cyan);
            font-weight: 600;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }

        .stat-card {
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: 16px;
            padding: 8px 12px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            backdrop-filter: blur(10px);
        }

        .stat-left {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .stat-icon {
            font-size: 20px;
        }

        .stat-title {
            font-size: 10px;
            color: var(--text-sub);
            font-weight: bold;
        }

        .stat-value {
            font-size: 14px;
            font-weight: 800;
        }

        /* --- 2. ÁREA CENTRAL (MÁQUINA DE MINAR / MAIN RIG) --- */
        .main-stage {
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            margin: 10px 0;
        }

        .rig-container {
            position: relative;
            width: 260px;
            height: 260px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: transform 0.1s ease;
        }

        .rig-container:active {
            transform: scale(0.95);
        }

        .rig-glow {
            position: absolute;
            width: 200px;
            height: 200px;
            background: radial-gradient(circle, rgba(0, 242, 254, 0.35) 0%, rgba(0,0,0,0) 70%);
            border-radius: 50%;
            animation: pulseGlow 2.5s infinite alternate;
        }

        @keyframes pulseGlow {
            0% { transform: scale(0.9); opacity: 0.5; }
            100% { transform: scale(1.2); opacity: 0.9; }
        }

        .rig-image {
            width: 100%;
            height: 100%;
            object-fit: contain;
            z-index: 2;
        }

        /* Float Floating Click Particle (+1) */
        .click-particle {
            position: absolute;
            color: var(--accent-cyan);
            font-size: 22px;
            font-weight: bold;
            pointer-events: none;
            animation: floatUp 0.8s ease-out forwards;
            z-index: 10;
        }

        @keyframes floatUp {
            0% { opacity: 1; transform: translateY(0); }
            100% { opacity: 0; transform: translateY(-50px); }
        }

        /* Banner Dorado de Saldo */
        .gold-banner {
            width: 90%;
            background: linear-gradient(135deg, #fcd34d 0%, #f59e0b 50%, #d97706 100%);
            border-radius: 20px;
            padding: 14px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            box-shadow: 0 0 20px rgba(245, 158, 11, 0.4);
            color: #000;
            margin-top: 10px;
        }

        .gold-amount {
            font-size: 22px;
            font-weight: 900;
        }

        .gold-usd {
            font-size: 11px;
            opacity: 0.8;
            font-weight: 600;
        }

        /* --- 3. GRID DE ACCIONES (4 CARDS) --- */
        .action-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 8px;
            padding: 0 16px;
            margin-top: 15px;
        }

        .action-card {
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: 16px;
            padding: 12px 6px;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            backdrop-filter: blur(10px);
            cursor: pointer;
        }

        .action-title {
            font-size: 9px;
            color: var(--text-sub);
            font-weight: 800;
            text-transform: uppercase;
            margin-bottom: 6px;
        }

        .action-icon {
            font-size: 26px;
            margin-bottom: 4px;
        }

        .action-val {
            font-size: 11px;
            font-weight: 800;
            color: var(--accent-cyan);
        }

        /* --- 4. BARRA DE NAVEGACIÓN INFERIOR --- */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            background: rgba(10, 14, 26, 0.92);
            backdrop-filter: blur(15px);
            border-top: 1px solid var(--card-border);
            display: flex;
            justify-content: space-around;
            padding: 10px 0;
            z-index: 100;
        }

        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            color: var(--text-sub);
            font-size: 10px;
            font-weight: 600;
            text-decoration: none;
            cursor: pointer;
        }

        .nav-item.active {
            color: var(--accent-cyan);
        }

        .nav-icon {
            font-size: 20px;
        }
    </style>
</head>
<body>

    <!-- 1. HEADER (Perfil y Marcadores) -->
    <header class="top-header">
        <div class="user-bar">
            <div class="profile-info">
                <img id="user-avatar" src="https://via.placeholder.com/40" class="avatar" alt="User">
                <div class="user-details">
                    <span id="user-name" class="username">Cargando...</span>
                    <span class="level-badge">LVL <span id="user-level">1</span></span>
                </div>
            </div>
            <!-- Botón TON Connect integrado -->
            <div id="ton-connect-button"></div>
        </div>

        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-left">
                    <span class="stat-icon">💵</span>
                    <div>
                        <div class="stat-title">CASH</div>
                        <div class="stat-value" id="val-cash">$0.00</div>
                    </div>
                </div>
            </div>
            <div class="stat-card">
                <div class="stat-left">
                    <span class="stat-icon">💎</span>
                    <div>
                        <div class="stat-title">GEMS</div>
                        <div class="stat-value" id="val-gems">0</div>
                    </div>
                </div>
            </div>
        </div>
    </header>

    <!-- 2. ÁREA CENTRAL (Máquina Minera + Saldo Principal) -->
    <main class="main-stage">
        <div class="rig-container" id="tap-rig">
            <div class="rig-glow"></div>
            <!-- Sustituye 'rig_machine.png' por la ruta de tu imagen generada -->
            <img src="rig_machine.png" alt="Mining Rig" class="rig-image" onerror="this.src='https://i.postimg.cc/m2D2Z1Wz/dwarf-run.gif'">
        </div>

        <!-- Banner Dorado -->
        <div class="gold-banner">
            <div>
                <div class="gold-amount" id="mined-coins">0.000000</div>
                <div class="gold-usd">≈ $<span id="mined-usd">0.00</span> USD</div>
            </div>
            <span style="font-size: 28px;">⚡</span>
        </div>
    </main>

    <!-- 3. TARJETAS DE ACCIÓN DE TEMPORADA -->
    <section class="action-grid">
        <div class="action-card" onclick="alert('¡Bono diario reclamado!')">
            <span class="action-title">Bono Diario</span>
            <span class="action-icon">📅</span>
            <span class="action-val">24:00</span>
        </div>
        <div class="action-card" onclick="alert('Boost 4x activado')">
            <span class="action-title">Boost</span>
            <span class="action-icon">🚀</span>
            <span class="action-val">4x</span>
        </div>
        <div class="action-card" onclick="alert('Misiones de temporada')">
            <span class="action-title">Misiones</span>
            <span class="action-icon">📋</span>
            <span class="action-val">24d 16h</span>
        </div>
        <div class="action-card" onclick="alert('Tienda ABIERTA')">
            <span class="action-title">Tienda</span>
            <span class="action-icon">📦</span>
            <span class="action-val">Exclusivo</span>
        </div>
    </section>

    <!-- 4. BARRA DE NAVEGACIÓN INFERIOR -->
    <nav class="bottom-nav">
        <div class="nav-item active">
            <span class="nav-icon">🏠</span>
            <span>Inicio</span>
        </div>
        <div class="nav-item" onclick="alert('Sección Mineros')">
            <span class="nav-icon">📻</span>
            <span>Mineros</span>
        </div>
        <div class="nav-item" onclick="alert('Sección Tareas')">
            <span class="nav-icon">📝</span>
            <span>Tareas</span>
        </div>
        <div class="nav-item" onclick="alert('Sección Amigos')">
            <span class="nav-icon">👥</span>
            <span>Amigos</span>
        </div>
        <div class="nav-item" onclick="solicitarRetiroTon()">
            <span class="nav-icon">👛</span>
            <span>Cartera</span>
        </div>
    </nav>

    <!-- LÓGICA DEL JUEGO -->
    <script>
        // Inicialización de Telegram SDK
        const tg = window.Telegram?.WebApp;
        if (tg) {
            tg.expand();
            if (tg.initDataUnsafe?.user) {
                document.getElementById('user-name').innerText = tg.initDataUnsafe.user.first_name || "Miner";
                if(tg.initDataUnsafe.user.photo_url) {
                    document.getElementById('user-avatar').src = tg.initDataUnsafe.user.photo_url;
                }
            }
        }

        // Inicialización de Tonkeeper (TonConnect UI)
        const tonConnectUI = new TON_CONNECT_UI.TonConnectUI({
            manifestUrl: 'https://raw.githubusercontent.com/ton-community/ton-connect-manifest/main/tonconnect-manifest.json',
            buttonRootId: 'ton-connect-button'
        });

        // Estado del Juego
        let saldoMinado = 1531.470673;
        let cash = 0.2295;
        let gems = 0;

        const elMinedCoins = document.getElementById('mined-coins');
        const elMinedUsd = document.getElementById('mined-usd');
        const elTapRig = document.getElementById('tap-rig');

        // Bucle de Minado Automático Pasivo
        setInterval(() => {
            saldoMinado += 0.000150;
            elMinedCoins.innerText = saldoMinado.toFixed(6);
            elMinedUsd.innerText = (saldoMinado * 0.00001).toFixed(4);
        }, 1000);

        // Tap en la Máquina con Efecto de Partícula (+1)
        elTapRig.addEventListener('touchstart', (e) => {
            e.preventDefault();
            saldoMinado += 0.01;
            elMinedCoins.innerText = saldoMinado.toFixed(6);

            // Crear animación de texto flotante
            const touch = e.touches[0];
            const particle = document.createElement('div');
            particle.className = 'click-particle';
            particle.innerText = '+0.01';
            particle.style.left = `${touch.clientX - 20}px`;
            particle.style.top = `${touch.clientY - 40}px`;
            document.body.appendChild(particle);

            setTimeout(() => particle.remove(), 800);
        });

        // Petición de Retiro a Tonkeeper
        async function solicitarRetiroTon() {
            if (!tonConnectUI.connected) {
                alert("Por favor, conecta tu billetera Tonkeeper arriba a la derecha.");
                return;
            }
            const walletAddress = tonConnectUI.account.address;
            alert(`Solicitando retiro automático para la wallet:\n${walletAddress}`);
        }
    </script>
</body>
    </html>

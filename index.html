<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crypto Miner Game</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #121212;
            color: #ffffff;
            text-align: center;
            padding: 20px;
            margin: 0;
        }
        h1 { color: #f39c12; }
        .mine-btn {
            background-color: #e67e22;
            color: white;
            border: none;
            padding: 15px 30px;
            font-size: 20px;
            border-radius: 10px;
            cursor: pointer;
            margin-top: 30px;
            box-shadow: 0px 4px 10px rgba(0,0,0,0.5);
        }
        .mine-btn:active {
            background-color: #d35400;
            transform: scale(0.98);
        }
        #score {
            font-size: 28px;
            margin: 20px 0;
            color: #2ecc71;
        }
    </style>
</head>
<body>

    <h1>⛏️ Crypto Miner Mini-App</h1>
    <p>¡Toca el botón para minar!</p>

    <div id="score">Monedas: 0</div>
    
    <button class="mine-btn" onclick="minar()">¡Minar! 🪙</button>

    <script>
        let tg = window.Telegram.WebApp;
        tg.expand();

        let monedas = 0;

        function minar() {
            monedas += 1;
            document.getElementById('score').innerText = "Monedas: " + monedas;
            
            if (tg.HapticFeedback) {
                tg.HapticFeedback.impactOccurred('medium');
            }
        }
    </script>
</body>
</html
